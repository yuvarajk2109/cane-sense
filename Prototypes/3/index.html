<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebSpeech — Listen & Transcribe</title>
  <style>
    body { font-family: system-ui, -apple-system, Roboto, Arial; padding: 20px; max-width: 720px; }
    #transcript { white-space: pre-wrap; border: 1px solid #ddd; padding: 10px; min-height: 120px; }
    button { margin-right: 8px; }
    .status { margin-top: 8px; color: #666; }
  </style>
</head>
<body>
  <h1>Listen & Transcribe (Web Speech API)</h1>

  <div>
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <div class="status" id="status">Status: idle</div>

  <h3>Transcript</h3>
  <div id="transcript">—</div>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');

    if (!SpeechRecognition) {
      statusEl.textContent = 'Web Speech API not supported in this browser.';
      startBtn.disabled = true;
    } else {
      const recog = new SpeechRecognition();

      recog.continuous = true;        
      recog.interimResults = true;   
      recog.lang = 'en-US';        

      let finalText = '';

      recog.onstart = () => {
        statusEl.textContent = 'Status: listening… (allow microphone if prompted)';
        startBtn.disabled = true;
        stopBtn.disabled = false;
      };

      recog.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          if (result.isFinal) {
            finalText += result[0].transcript + '\n';
          } else {
            interim += result[0].transcript;
          }
        }
        transcriptEl.textContent = (finalText + interim).trim() || '—';
      };

      recog.onerror = (e) => {
        console.error('Speech recognition error', e);
        statusEl.textContent = 'Error: ' + (e.error || 'unknown');
      };

      recog.onend = () => {
        statusEl.textContent = 'Status: stopped';
        startBtn.disabled = false;
        stopBtn.disabled = true;
      };

      startBtn.addEventListener('click', () => {
        finalText = '';                 
        transcriptEl.textContent = '—';
        try {
          recog.start();
        } catch (err) {
          console.warn(err);
        }
      });

      stopBtn.addEventListener('click', () => {
        recog.stop();
      });
    }
  </script>
</body>
</html>
